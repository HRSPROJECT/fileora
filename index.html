    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        var host = location.hostname;
        var isLocalDev = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';

        // Vite dev: unregister SW so /share and HMR are never broken by stale caches
        if (isLocalDev) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) {
              reg.unregister().then(function (ok) {
                if (ok) console.log('[Fileora] Service worker unregistered for local development');
              });
            });
          });
          return;
        }

        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
            .then(function (reg) {
              console.log('Fileora Service Worker registered:', reg.scope);
            })
            .catch(function (err) {
              console.warn('Fileora Service Worker registration failed:', err);
            });
        });
      })();
    </script>
